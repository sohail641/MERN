<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time machine</title>
    <style>
         *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#582424;
            font-family:Arial, sans-serif;
        }

        #myclock{
            background:#111;
            color:#748d29;
            padding:25px 50px;
            font-size:60px;
            border-radius:15px;
            box-shadow:0 0 20px #9db3a8;
            letter-spacing:3px;
        }
    </style>
</head>

<body>
     <div id="myclock"></div>

    <script>
        function clock(){
    let ele=document.getElementById("myclock")
    let date=new Date()
    let h=date.getHours()
    let m=date.getMinutes()
    let s=date.getSeconds()
    let time = h+":"+m+":"+s

    setTimeout(()=>{
        clock()
    },1000)
    ele.innerText=time
}
clock()
    </script>
</body>

</html>
